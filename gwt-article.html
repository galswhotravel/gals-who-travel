<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Blog — Gals Who Travel</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400;1,700&family=Instrument+Serif:ital,wght@0,400;0,700;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
em{font-family:'Playfair Display',serif;font-style:italic}
:root{--red:#E8180A;--red-d:#C01008;--red-pale:#FFF0EF;--pink:#FFE3E6;--pink-m:#FFC5CB;--ink:#0F0505;--ink-2:#2A1010;--mut:#7A5555;--sand:#FAF6F1;--bdr:#EDE0E0;--white:#fff}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--ink);overflow-x:hidden}
a{text-decoration:none;color:inherit}
img{display:block;max-width:100%}

/* ANN */
.ann{background:var(--ink);color:#fff;text-align:center;padding:10px 16px;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px}
.ann a{color:var(--pink-m);font-weight:700;text-decoration:underline}

/* NAV */
nav{background:var(--white);border-bottom:1px solid var(--bdr);position:sticky;top:0;z-index:500;height:68px;display:flex;align-items:center;padding:0 40px;gap:24px}
.nl-text{font-family:'Instrument Serif',serif;font-size:22px;color:var(--ink)}
.nl-text em{font-style:italic;color:var(--red)}
.nav-links{display:flex;align-items:center;list-style:none;flex:1;gap:4px}
.nav-links a{font-size:14px;font-weight:500;color:var(--mut);padding:0 12px;height:68px;display:flex;align-items:center;transition:color .15s}
.nav-links a:hover,.nav-links a.act{color:var(--red)}
.nav-acts{margin-left:auto}
.ncta{background:var(--red);color:#fff;border-radius:24px;padding:10px 22px;font-size:13px;font-weight:700;transition:background .15s;display:inline-block}
.ncta:hover{background:var(--red-d)}

/* ARTICLE HERO */
.art-hero{position:relative;height:520px;overflow:hidden}
.art-hero img{width:100%;height:100%;object-fit:cover}
.art-hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,2,2,.88) 0%,rgba(10,2,2,.1) 55%,transparent 100%)}
.art-hero-body{position:absolute;bottom:0;left:0;right:0;padding:48px 40px;max-width:900px;margin:0 auto}
.art-breadcrumb{display:flex;align-items:center;gap:8px;font-size:12px;color:rgba(255,255,255,.45);margin-bottom:12px}
.art-breadcrumb a{color:rgba(255,255,255,.55);transition:color .15s}
.art-breadcrumb a:hover{color:var(--pink-m)}
.art-cat{display:inline-flex;background:var(--red);color:#fff;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;padding:5px 12px;border-radius:20px;margin-bottom:14px}
.art-title{font-family:'Instrument Serif',serif;font-size:clamp(28px,5vw,52px);color:#fff;font-weight:400;line-height:1.08;margin-bottom:16px}
.art-title em{font-style:italic;color:var(--pink-m)}
.art-meta{font-size:13px;color:rgba(255,255,255,.5);display:flex;align-items:center;gap:16px}
.art-meta span{display:flex;align-items:center;gap:5px}

/* ARTICLE BODY */
.art-wrap{max-width:720px;margin:0 auto;padding:56px 40px}
.art-excerpt{font-size:18px;color:var(--mut);line-height:1.75;margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid var(--bdr);font-weight:300}
.art-content{font-size:16px;line-height:1.85;color:var(--ink-2)}
.art-content h2{font-family:'Instrument Serif',serif;font-size:28px;font-weight:400;color:var(--ink);margin:36px 0 14px;line-height:1.2}
.art-content h2 em{font-style:italic;color:var(--red)}
.art-content h3{font-family:'Instrument Serif',serif;font-size:22px;font-weight:400;color:var(--ink);margin:28px 0 10px}
.art-content p{margin-bottom:18px}
.art-content ul,.art-content ol{margin:12px 0 18px 24px}
.art-content li{margin-bottom:6px}
.art-content blockquote{border-left:3px solid var(--red);padding-left:20px;margin:24px 0;color:var(--mut);font-style:italic;font-size:17px;line-height:1.7}
.art-content img{max-width:100%;border-radius:16px;margin:24px 0;box-shadow:0 4px 24px rgba(10,2,2,.1)}
.art-content a{color:var(--red);text-decoration:underline}
.art-content strong{font-weight:700;color:var(--ink)}

/* SHARE */
.art-share{margin-top:48px;padding-top:36px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.art-share span{font-size:13px;font-weight:600;color:var(--mut)}
.share-btn{border:1.5px solid var(--bdr);border-radius:20px;padding:8px 16px;font-size:12px;font-weight:600;background:var(--white);cursor:pointer;transition:all .15s}
.share-btn:hover{border-color:var(--red);color:var(--red)}

/* AUTHOR */
.author-box{background:var(--sand);border-radius:16px;padding:24px;display:flex;gap:18px;align-items:center;margin-top:40px}
.author-av{width:52px;height:52px;border-radius:50%;background:var(--pink-m);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:22px;color:var(--red-d);flex-shrink:0}
.author-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px}
.author-bio{font-size:13px;color:var(--mut);line-height:1.6}

/* CTA */
.art-cta{background:var(--ink);border-radius:20px;padding:40px;text-align:center;margin:48px 0 0}
.art-cta h3{font-family:'Instrument Serif',serif;font-size:26px;color:#fff;font-weight:400;margin-bottom:8px}
.art-cta h3 em{font-style:italic;color:var(--pink-m)}
.art-cta p{font-size:14px;color:rgba(255,255,255,.45);margin-bottom:20px}
.art-cta a{display:inline-flex;align-items:center;gap:8px;background:var(--red);color:#fff;border-radius:24px;padding:14px 28px;font-size:14px;font-weight:700;transition:background .2s}
.art-cta a:hover{background:var(--red-d)}

/* RELATED */
.related-sec{padding:56px 40px;max-width:1200px;margin:0 auto}
.rel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:24px}
.rel-card{border-radius:14px;overflow:hidden;background:var(--white);border:1px solid var(--bdr);cursor:pointer;transition:transform .2s}
.rel-card:hover{transform:translateY(-4px)}
.rel-img{height:160px;overflow:hidden}
.rel-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.rel-card:hover .rel-img img{transform:scale(1.06)}
.rel-body{padding:16px}
.rel-cat{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--red);letter-spacing:.08em;margin-bottom:5px}
.rel-title{font-family:'Instrument Serif',serif;font-size:15px;font-weight:400;color:var(--ink);line-height:1.3}

/* PROGRESS BAR */
#read-progress{position:fixed;top:0;left:0;height:3px;background:var(--red);z-index:999;transition:width .1s linear;width:0}

/* FOOTER */
footer{background:#080202;padding:40px;text-align:center}
footer p{font-size:12px;color:rgba(255,255,255,.25)}
footer a{color:rgba(255,255,255,.4);margin:0 8px}
footer a:hover{color:var(--pink-m)}

@media(max-width:768px){
  nav{padding:0 20px}
  .nav-links{display:none}
  .art-hero{height:360px}
  .art-hero-body{padding:28px 20px}
  .art-wrap{padding:36px 20px}
  .related-sec{padding:36px 20px}
  .rel-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div id="read-progress"></div>
<div id="ann-bar"></div>

<nav>
  <a href="/" style="flex-shrink:0">
    <span class="nl-text">gals who <em>travel</em></span>
  </a>
  <ul class="nav-links">
    <li><a href="gwt-final.html#dest-sec">Destinations</a></li>
    <li><a href="gwt-final.html#trips-sec">Trips</a></li>
    <li><a href="gwt-blog.html" class="act">Blog</a></li>
  </ul>
  <div class="nav-acts">
    <a class="ncta" href="https://galswhotravel.trutravels.com/upcoming-trips" target="_blank">Find a Trip</a>
  </div>
</nav>

<div id="article-container"></div>

<footer>
  <p>© 2026 Gals Who Travel · Operated by TruTravels Ltd ·
    <a href="/">Home</a>
    <a href="gwt-blog.html">Blog</a>
    <a href="gwt-cms.html">Admin</a>
  </p>
</footer>

  {"id":"fb2","title":"Why Bali Is the Perfect Gap Year Destination","excerpt":"You've just finished university, your passport is ready, and the whole world is waiting. Bali ticks every box — affordable, safe, beautiful and packed with experiences.","content":"<h2>Bali on a <em>budget</em></h2><p>One of the best things about Bali is how much you get for your money. Beautiful accommodation, incredible food, and world-class experiences are all available without breaking the bank.</p><h2>What to do in Bali</h2><p>From the spiritual temples of Ubud to the surf beaches of Canggu, the party vibes of Seminyak to the paradise island of Gili T — Bali has something for every type of traveller.</p><h3>The Gili Islands</h3><p>No trip to Bali is complete without a few days on Gili T. Snorkelling with sea turtles, watching the most incredible sunsets from a sea swing, and nights out under the stars.</p><blockquote>Bali genuinely changed my perspective on travel. I went solo and left with 11 friends for life. — Jess, GWT Bali Jan 2026</blockquote>","category":"Destination","dest":"Bali","date":"2 Apr 2026","status":"published","author":"gals who community","coverUrl":"https://galswhotravel.trutravels.com/indonesia-images-itinerary/sea-swings-gili-t-sunset.jpg"}]
</template>

<script>
function gs(k){try{return JSON.parse(localStorage.getItem('gwt_'+k))||null}catch{return null}}

function init(){
  // Banner
  const b=gs('banner')||{visible:true,text:'🔥 40% off Bali Paradise — departing 20th May from £657 🌴',linkText:'Book now →',linkUrl:'https://galswhotravel.trutravels.com/bali-paradise/girls-trip'};
  if(b.visible) document.getElementById('ann-bar').innerHTML=`<div class="ann">${b.text} <a href="${b.linkUrl}" target="_blank">${b.linkText}</a></div>`;

  // Get post id from URL
  const params=new URLSearchParams(location.search);
  const id=params.get('id');

  const stored=gs('posts')||[];
  const fallback=JSON.parse(document.getElementById('fallback-data').innerHTML);
  const all=[...stored,...fallback.filter(f=>!stored.find(s=>s.id===f.id))];
  const post=id?all.find(p=>p.id===id||p.slug===id):all[0];

  if(!post){
    document.getElementById('article-container').innerHTML=`<div style="text-align:center;padding:100px 20px"><h2 style="font-family:'Instrument Serif',serif;font-size:28px;margin-bottom:12px">Post not found</h2><a href="gwt-blog.html" style="color:var(--red);font-weight:600">← Back to blog</a></div>`;
    return;
  }

  document.title=`${post.title} — Gals Who Travel`;
  renderArticle(post, all.filter(p=>p.id!==post.id&&p.status==='published').slice(0,3));
}

function renderArticle(post, related){
  const cover=post.coverUrl||post.cover||'https://galswhotravel.trutravels.com/thailand/khao-sok-national-park-floating-bungalows.jpg';
  const content=post.content||`<p>${post.excerpt||''}</p>`;

  document.getElementById('article-container').innerHTML=`
    <div class="art-hero">
      <img src="${cover}" alt="${post.title}" onerror="this.src='https://galswhotravel.trutravels.com/thailand/khao-sok-national-park-floating-bungalows.jpg'">
      <div class="art-hero-ov"></div>
      <div class="art-hero-body">
        <div class="art-breadcrumb">
          <a href="gwt-blog.html">Blog</a> <span>›</span>
          <a href="gwt-blog.html">${post.category||'Stories'}</a> <span>›</span>
          <span style="color:rgba(255,255,255,.7)">${post.title}</span>
        </div>
        <span class="art-cat">${post.category||'Blog'}</span>
        <h1 class="art-title">${formatTitle(post.title)}</h1>
        <div class="art-meta">
          <span>✍️ ${post.author||'gals who community'}</span>
          <span>📅 ${post.date||''}</span>
          ${post.dest?`<span>📍 ${post.dest}</span>`:''}
        </div>
      </div>
    </div>

    <div class="art-wrap">
      ${post.excerpt?`<p class="art-excerpt">${post.excerpt}</p>`:''}
      <div class="art-content" id="art-body">${content}</div>
      <div class="art-share">
        <span>Share this post:</span>
        <button class="share-btn" onclick="share('twitter')">𝕏 Twitter</button>
        <button class="share-btn" onclick="share('facebook')">Facebook</button>
        <button class="share-btn" onclick="copyLink()">🔗 Copy link</button>
      </div>
      <div class="author-box">
        <div class="author-av">G</div>
        <div>
          <div class="author-name">${post.author||'gals who community'}</div>
          <div class="author-bio">Part of the Gals Who Travel community — passionate travellers sharing real stories, honest tips and the best women-only adventures on the planet.</div>
        </div>
      </div>
      <div class="art-cta">
        <h3>Ready for your own <em>adventure?</em></h3>
        <p>Join a women-only group and see the world safely, joyfully, without waiting for anyone else.</p>
        <a href="https://galswhotravel.trutravels.com/upcoming-trips" target="_blank">Find my trip →</a>
      </div>
    </div>

    ${related.length?`
    <div class="related-sec">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <h2 style="font-family:'Instrument Serif',serif;font-size:26px;font-weight:400">More <em style="font-style:italic;color:var(--red)">stories</em></h2>
        <a href="gwt-blog.html" style="font-size:13px;font-weight:600;color:var(--red)">All posts →</a>
      </div>
      <div class="rel-grid">${related.map(r=>`
        <div class="rel-card" onclick="location.href='gwt-article.html?id=${r.id}'">
          <div class="rel-img"><img src="${r.coverUrl||r.cover||''}" onerror="this.src='https://galswhotravel.trutravels.com/thailand/khao-sok-national-park-floating-bungalows.jpg'" alt="${r.title}" loading="lazy"></div>
          <div class="rel-body"><div class="rel-cat">${r.category||'Blog'}</div><div class="rel-title">${r.title}</div></div>
        </div>`).join('')}
      </div>
    </div>`:''}`;

  // Reading progress bar
  window.addEventListener('scroll',()=>{
    const body=document.getElementById('art-body');
    if(!body)return;
    const top=body.getBoundingClientRect().top+window.scrollY;
    const bottom=body.getBoundingClientRect().bottom+window.scrollY;
    const progress=Math.min(100,Math.max(0,(window.scrollY-top)/(bottom-top-window.innerHeight)*100));
    document.getElementById('read-progress').style.width=progress+'%';
  });
}

function formatTitle(t){
  const w=t.split(' ');
  if(w.length>3){const last=w.pop();return w.join(' ')+' <em>'+last+'</em>';}
  return t;
}

function share(platform){
  const url=encodeURIComponent(location.href);
  const title=encodeURIComponent(document.title);
  const urls={twitter:`https://twitter.com/intent/tweet?url=${url}&text=${title}`,facebook:`https://www.facebook.com/sharer/sharer.php?u=${url}`};
  window.open(urls[platform],'_blank','width=600,height=400');
}
function copyLink(){navigator.clipboard.writeText(location.href).then(()=>{const b=event.target;b.textContent='✓ Copied!';setTimeout(()=>{b.textContent='🔗 Copy link';},2000);});}

init();
</script>
</body>
</html>
